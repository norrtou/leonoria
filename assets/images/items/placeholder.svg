<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="6" fill="#1e1e2e"/>
  <rect x="1" y="1" width="62" height="62" rx="5" fill="none" stroke="#3a3a5a" stroke-width="1"/>

  <!-- Generic sword silhouette -->
  <g fill="#44445a">
    <!-- Blade -->
    <polygon points="32,6 30,40 34,40" />
    <!-- Cross-guard -->
    <rect x="20" y="38" width="24" height="5" rx="2"/>
    <!-- Grip -->
    <rect x="29.5" y="43" width="5" height="11" rx="2"/>
    <!-- Pommel -->
    <ellipse cx="32" cy="57" rx="5" ry="3.5"/>
  </g>

  <!-- Question mark — "no image yet" indicator -->
  <text x="32" y="26" font-family="Georgia, serif" font-size="11" font-weight="bold"
        fill="#5a5a8a" text-anchor="middle" opacity="0.6">?</text>
</svg>
