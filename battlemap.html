<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Battle Map Simulator — Leonoria</title>
    <meta name="description" content="Leonoria Battle Map Simulator — turn-based tactical combat on a hex grid. Pit heroes against monsters with real class skills, spells, and terrain.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Leonoria">
    <link rel="canonical" href="https://norrtou.github.io/leonoria/battlemap.html">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Battle Map Simulator — Leonoria">
    <meta property="og:description" content="Turn-based tactical combat on a hex grid. Pit heroes against monsters with real class skills, spells, and terrain.">
    <meta property="og:url" content="https://norrtou.github.io/leonoria/battlemap.html">
    <meta property="og:image" content="https://norrtou.github.io/leonoria/assets/images/og-cover.jpg">
    <meta property="og:site_name" content="Leonoria">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Battle Map Simulator — Leonoria">
    <meta name="twitter:description" content="Turn-based tactical combat on a hex grid. Pit heroes against monsters with real class skills, spells, and terrain.">
    <meta name="twitter:image" content="https://norrtou.github.io/leonoria/assets/images/og-cover.jpg">

    <meta name="theme-color" content="#141d0e">

    <!-- Icons & manifest -->
    <link rel="icon" href="assets/images/favicon.ico" sizes="48x48">
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- Google Fonts: IM Fell English -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="battle-map.css">
</head>
<body>

    <div class="battle-container">
        <!-- Header -->
        <div class="battle-header">
            <h1 class="battle-title">⚔ Battle Map Simulator</h1>
            <div class="battle-info">
                <div class="turn-display">
                    <span>Turn:</span>
                    <div class="turn-number" id="turn-counter">1</div>
                </div>
            </div>
            <div style="display:flex;gap:0.6rem;align-items:center;">
                <button class="battle-change-btn" id="btn-change-party">⚑ Change Party</button>
                <a href="index.html" class="battle-back-btn">← Return to Home</a>
            </div>
        </div>

        <!-- Battle canvas -->
        <div class="battle-canvas-area">
            <canvas id="hex-background-canvas"></canvas>
            <canvas id="hex-overlay-canvas"></canvas>
            <canvas id="unit-canvas"></canvas>
            <!-- Combat overlays -->
            <div class="combat-panel" id="combat-panel" style="display:none">
                <div class="cp-title" id="cp-name">—</div>
                <div id="cp-attacks"></div>
                <button class="cp-btn cp-end-btn" id="cp-end-btn">⏭ End Turn</button>
            </div>
            <div class="initiative-bar" id="initiative-bar"></div>
            <div class="combat-log"     id="combat-log"></div>
            <div class="turn-banner"    id="turn-banner">Round 1</div>
            <div class="range-warning"  id="range-warning"></div>
            <div class="battle-result"  id="battle-result"></div>
        </div>

        </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <!-- Character Sheet Overlay -->
    <div class="cs-overlay" id="cs-overlay" style="display:none">
        <div class="cs-panel">
            <button class="cs-close" id="cs-close-btn" title="Close">✕</button>
            <div id="cs-content"></div>
        </div>
    </div>

    <!-- Team Select Overlay -->
    <div class="team-select-overlay" id="team-select-overlay" style="display:none">
        <div class="tso-panel">
            <h2 class="tso-title">Choose Your Party</h2>

            <div>
                <div class="tso-section-title">Lighting</div>
                <div class="tso-lighting-row">
                    <button class="tso-lighting-btn active" id="btn-lighting-day" data-mode="day">
                        ☀ Daytime
                    </button>
                    <button class="tso-lighting-btn" id="btn-lighting-night" data-mode="night">
                        🌙 Nighttime
                    </button>
                </div>
            </div>

            <div>
                <div class="tso-section-title">Map Type</div>
                <div class="tso-lighting-row">
                    <button class="tso-lighting-btn active" id="btn-map-outdoor">
                        ☀ Outdoor
                    </button>
                    <button class="tso-lighting-btn" id="btn-map-dungeon">
                        ⛏ Dungeon
                    </button>
                </div>
            </div>

            <div>
                <div class="tso-section-title">Placeholder Teams</div>
                <button class="tso-default-btn" id="btn-default-team">
                    ⚔ Warrior · Wizard · Rogue
                </button>
                <button class="tso-default-btn" id="btn-team-holy">
                    ✦ Cleric · Ranger · Warlock
                </button>
                <button class="tso-default-btn" id="btn-team-dark">
                    ☽ Sorcerer · Necromancer · Witch
                </button>
                <button class="tso-default-btn" id="btn-team-nature">
                    ✦ Lifewhisperer · Aquorist · Shaman
                </button>
                <button class="tso-default-btn" id="btn-team-storm">
                    ⚡ Stormcaller · Bloodsinger · Beastcaller
                </button>
                <button class="tso-default-btn" id="btn-team-new-classes">
                    ✦ Dark Templar · Priest · Rascal
                </button>
            </div>

            <div id="tso-parties-section">
                <div class="tso-section-title">Saved Parties</div>
                <div id="tso-parties-list"></div>
            </div>
        </div>
    </div>

    <script src="data/combat/ai_tactics.js"></script>
    <script src="battle-map.js"></script>
</body>
</html>
